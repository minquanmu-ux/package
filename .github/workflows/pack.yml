name: 打包为 Windows EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'approval.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包
        run: pyinstaller --onefile --console --name approval approval.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: approval-exe
          path: dist/approval.exe
